name: one_beat
description: "A new Flutter project for 108-tap rhythmic exercise and meditation with cat ecosystem."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  provider: ^6.0.0
  get: ^4.6.0
  lottie: ^2.4.0
  flutter_local_notifications: ^14.0.0
  google_fonts: ^6.0.0
  flutter_svg: ^2.0.0
  audioplayers: ^5.0.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true